<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迪卡侬大童智能尺码助手 - 官方数据版</title>
    <style>
        :root {
            --decathlon-blue: #3643BA;
            --decathlon-green: #7AFFA6;
            --light-bg: #F4F6F9;
            --container-bg: #FFFFFF;
            --text-main: #111424;
            --text-muted: #676E8A;
            --warning-orange: #FF9800;
            --error-red: #D32F2F;
            --success-green: #2E7D32;
            --purple-deep: #6366F1;
            --border-base: #E2E8F0;
            --transition-base: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
            min-width: 320px;
        }

        .card-wrap {
            background: var(--container-bg);
            border-radius 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 20px;
        }
        .btn-base {
            width: 100%;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-base);
            margin-top: 8px;
        }
        .btn-base:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .input-base {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border-base);
            border-radius: 10px;
            font-size: 13.5px;
            outline: none;
            transition: var(--transition-base);
        }
        .input-base:focus {
            border-color: var(--decathlon-blue);
        }

        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            background-color: var(--decathlon-blue);
            color: #fff;
            display: inline-block;
            padding: 6px 16px;
            font-weight: 900;
            font-style: italic;
            font-size: 18px;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 8px;
            user-select: none;
        }
        h1 {
            font-size: 18px;
            color: var(--text-main);
            font-weight: 700;
        }
        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .info-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--decathlon-blue);
            margin: 15px 0 10px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-base);
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        @media(min-width:400px){
            .form-grid-2{grid-template-columns: 1fr 1fr;}
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .radio-tile-group {
            display: flex;
            gap: 8px;
        }
        .radio-tile-label {
            position: relative;
            flex: 1;
        }
        .radio-tile-label input {
            position: absolute;
            opacity: 0;
            height: 0;
            width: 0;
        }
        .radio-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            border: 2px solid var(--border-base);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            transition: var(--transition-base);
        }
        .radio-tile-label input:checked + .radio-tile {
            border-color: var(--decathlon-blue);
            background-color: #F0F4FF;
            color: var(--decathlon-blue);
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-input-with-unit {
            padding-right: 40px;
        }
        .input-unit {
            position: absolute;
            right: 14px;
            font-size: 12px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .btn-calc {
            background-color: var(--decathlon-blue);
        }
        .btn-warning {
            background: var(--warning-orange);
        }
        .btn-purple {
            background: var(--purple-deep);
        }

        .result-view {
            display: none;
            margin-top: 20px;
            border-top: 2px dashed var(--border-base);
            padding-top: 15px;
        }
        .rec-card {
            background: linear-gradient(135deg, #3643BA 0%, #1A2580);
            color: white;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: var(--transition-base);
        }
        /* 修正后尺码卡片改为绿色渐变 */
        .rec-card.revised {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            box-shadow: 0 0 0 3px rgba(122, 255, 166, 0.4);
        }
        .confidence-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 20px;
            background-color: rgba(122, 255, 166, 0.2);
            color: #7AFFA6;
        }
        .rec-code {
            font-size: 22px;
            font-weight: 800;
            margin: 8px 0;
            letter-spacing: 0.5px;
        }
        .rec-style-hint {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 4px;
            padding: 4px;
            min-height: 20px;
        }
        .data-summary {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin: 10px 0;
        }
        .tip-lowage{
            background:rgba(255,152,0,0.15);
            border:1px solid var(--warning-orange);
            border-radius:8px;
            padding:8px;
            font-size:12px;
            color:#c25000;
            margin-top:8px;
        }

        .feedback-box {
            background: #F8FAFC;
            border: 1px dashed #CBD5E1;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
        }
        .btn-feedback {
            flex: 1;
            background: white;
            border: 1px solid #CBD5E1;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-base);
        }
        .btn-feedback.selected {
            background: var(--decathlon-blue);
            border-color: var(--decathlon-blue);
            color: white;
        }

        .measure-section {
            display: none;
            background: #FFFBF0;
            border: 1px solid #FFE0B2;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
        }

        .second-feedback-box {
            background: #F0F4FF;
            border: 1px dashed #c7d2fe;
            display: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 14, 36, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        .modal-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--decathlon-blue);
            margin-bottom: 8px;
        }
        .modal-highlight {
            font-size: 16px;
            color: #E65100;
            font-weight: bold;
            margin: 24px 0;
            padding: 15px;
            background: #FFF9E6;
            border: 1px dashed #FFE0B2;
            border-radius: 10px;
            line-height: 1.4;
        }
        .modal-close {
            margin-top:10px;
            background:#ccc;
        }
    </style>
</head>
<body>
<div class="container card-wrap">
    <header>
        <div class="logo">DECATHLON</div>
        <h1>大童智能尺码实验系统</h1>
        <div class="subtitle">数字化生产加固版 1.2</div>
    </header>

    <main>
        <div class="info-section-title">👤 基本信息登记（选填）</div>
        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">姓名</label>
                <input type="text" id="tester-name" class="input-base form-input-with-unit" placeholder="选填，请输入姓名">
            </div>
            <div class="form-group">
                <label class="form-label">联系方式</label>
                <input type="text" id="tester-contact" class="input-base form-input-with-unit" placeholder="选填，手机或群内昵称">
            </div>
        </div>

        <div class="info-section-title">🏃 核心体征指标</div>
        <div class="form-group">
            <label class="form-label">目标服装品类</label>
            <div class="radio-tile-group">
                <label class="radio-tile-label"><input type="radio" name="category" value="tshirt" checked><div class="radio-tile">👕 T恤</div></label>
                <label class="radio-tile-label"><input type="radio" name="category" value="jacket"><div class="radio-tile">🧥 夹克</div></label>
                <label class="radio-tile-label"><input type="radio" name="category" value="pants"><div class="radio-tile">👖 长裤</div></label>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">性别</label>
            <div class="radio-tile-group">
                <label class="radio-tile-label"><input type="radio" name="gender" value="boy" checked><div class="radio-tile">👦 男童</div></label>
                <label class="radio-tile-label"><input type="radio" name="gender" value="girl"><div class="radio-tile">👧 女童</div></label>
            </div>
        </div>
        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">名义年龄（可小于6岁）</label>
                <div class="input-wrapper">
                    <input type="number" id="age" class="input-base form-input-with-unit" placeholder="最低3岁" min="3" max="16">
                    <span class="input-unit">岁</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">实测裸脚身高</label>
                <div class="input-wrapper">
                    <input type="number" id="height" class="input-base form-input-with-unit" placeholder="厘米(cm)" min="123" max="172">
                    <span class="input-unit">cm</span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">实测净体重</label>
            <div class="input-wrapper">
                <input type="number" id="weight" class="input-base form-input-with-unit" placeholder="公斤(kg)，支持一位小数" step="0.1" min="10" max="150">
                <span class="input-unit">kg</span>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">备注补充 (选填)</label>
            <input type="text" id="remark" class="input-base form-input-with-unit" placeholder="例如：5岁身高偏高">
        </div>

        <div class="form-grid-2" style="gap:8px;">
            <button type="button" id="btn-primary-calc" class="btn-base btn-calc" onclick="matchPrimarySize()">实时计算试穿尺码</button>
            <button type="button" id="btn-reset-all" class="btn-base modal-close" onclick="fullResetAll()">清空全部表单</button>
        </div>

        <div class="result-view" id="consumer-view">
            <div class="rec-card" id="rec-card-bg">
                <span class="confidence-badge" id="confidence-tag">推荐置信度: 高</span>
                <div style="font-size:11px; opacity:0.8;" id="rec-title-type">建议首选试穿码</div>
                <div class="rec-code" id="rec-code">--</div>
                <div class="rec-style-hint" id="rec-style-hint">--</div>
            </div>
            <div class="data-summary" id="data-summary"></div>
            <div class="tip-lowage" id="lowAgeTip" style="display:none;">
                ⚠️ 提示：该儿童实际年龄低于样本基准7岁，虽身高匹配本尺码，但版型偏大龄，试穿建议优先看宽松款
            </div>

            <div class="feedback-box" id="primary-feedback-area">
                <div style="font-size:12px; font-weight:700; margin-bottom:8px;">🎯 阶段一：初次试穿确认</div>
                <div class="radio-tile-group">
                    <button class="btn-feedback" id="btn-fb-perfect" onclick="handlePrimaryFeedback(this, '完美合身')">👍 完美合身</button>
                    <button class="btn-feedback" id="btn-fb-modify" onclick="handlePrimaryFeedback(this, '不合身-需要精确修正')">👔 不太合适/需修正</button>
                </div>
            </div>

            <div class="measure-section" id="measure-section">
                <div style="font-size:12px; font-weight:700; color:#E65100; margin-bottom:8px;">📐 请使用软尺测量以下精细数据以修正算法</div>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label" id="measure-label-1">实测胸围</label>
                        <div class="input-wrapper">
                            <input type="number" id="measure-input-1" class="input-base form-input-with-unit" placeholder="cm" min="30" max="150">
                            <span class="input-unit">cm</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="measure-label-2">实测腰围</label>
                        <div class="input-wrapper">
                            <input type="number" id="measure-input-2" class="input-base form-input-with-unit" placeholder="cm" min="30" max="150">
                            <span class="input-unit">cm</span>
                        </div>
                    </div>
                </div>
                <button type="button" id="btn-secondary-calc" class="btn-base btn-warning" onclick="matchSecondarySize()">运行 P95 三维修正算法</button>
            </div>

            <div class="feedback-box second-feedback-box" id="second-feedback-area">
                <div style="font-size:12px; font-weight:700; color:var(--purple-deep); margin-bottom:8px;">✨ 阶段二：精细修正后试穿反馈</div>
                <div class="radio-tile-group">
                    <button class="btn-feedback" id="btn-second-fit" onclick="handleSecondFeedback(this, '修正后合身')">✅ 修正后合身</button>
                    <button class="btn-feedback" id="btn-second-unfit" onclick="handleSecondFeedback(this, '依旧不合身')">❌ 依旧不合身</button>
                </div>
            </div>

            <div class="feedback-box" id="secondary-feedback-area" style="display:none;">
                <div style="font-size:12px; font-weight:700; color:var(--purple-deep); margin-bottom:8px;">🚀 数据核对与最终上传</div>
                <button type="button" id="btn-cloud-submit" class="btn-base btn-purple" onclick="secureSubmitToCloud()">确认无误并上传云端数据</button>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="gift-modal">
    <div class="modal-container">
        <div class="modal-title">🎉 感谢您的真实反馈</div>
        <div style="font-size: 13px; color: var(--text-muted);">数据已成功建立安全物理存档</div>
        <div class="modal-highlight">📸 请凭此截图到前台找工作人员领取小礼物</div>
        <button class="btn-base btn-calc" onclick="location.reload()">结束测试并重置系统</button>
        <button class="btn-base modal-close" onclick="closeModal()">关闭弹窗继续填写</button>
    </div>
</div>

<script>
    // 官方男女体型标准
    const SIZE_BRACKETS = ["123-130cm 7-8岁", "131-140cm 8-9岁", "141-150cm 10-11岁", "151-160cm 12-13岁", "161-172cm 14-15岁"];
    const BOY_STANDARDS = {
        "123-130cm 7-8岁": { chest: 63.74, waist: 57.99, hip: 67.55, leg: 20.39, avgWeight: 26.67 },
        "131-140cm 8-9岁": { chest: 69.00, waist: 63.06, hip: 73.01, leg: 21.32, avgWeight: 32.87 },
        "141-150cm 10-11岁": { chest: 75.53, waist: 69.01, hip: 79.69, leg: 23.07, avgWeight: 42.23 },
        "151-160cm 12-13岁": { chest: 82.72, waist: 74.28, hip: 86.34, leg: 25.73, avgWeight: 52.59 },
        "161-172cm 14-15岁": { chest: 87.81, waist: 77.22, hip: 92.27, leg: 27.74, avgWeight: 62.53 }
    };
    const GIRL_STANDARDS = {
        "123-130cm 7-8岁": { chest: 63.45, waist: 57.47, hip: 67.17, leg: 18.57, avgWeight: 26.07 },
        "131-140cm 8-9岁": { chest: 68.46, waist: 61.67, hip: 72.10, leg: 19.57, avgWeight: 31.54 },
        "141-150cm 10-11岁": { chest: 78.07, waist: 68.18, hip: 83.83, leg: 22.18, avgWeight: 43.31 },
        "151-160cm 12-13岁": { chest: 82.99, waist: 71.86, hip: 89.65, leg: 23.66, avgWeight: 50.64 },
        "161-172cm 14-15岁": { chest: 85.94, waist: 74.65, hip: 93.75, leg: 24.77, avgWeight: 56.62 }
    };

    let isSubmitting = false;
    let calcTimer = null;
    let currentDataPayload = {
        primarySize: "",
        primaryFeedback: "",
        measureValue1: 0,
        measureValue2: 0,
        secondarySize: "未触发修正",
        secondaryFeedback: "完美合身/无需修正"
    };

    function closeModal() {
        document.getElementById('gift-modal').style.display = "none";
    }

    function fullResetAll() {
        document.querySelectorAll('.input-base').forEach(input => input.value = "");
        resetDownstreamState();
        document.getElementById('consumer-view').style.display = "none";
    }

    function resetDownstreamState() {
        currentDataPayload.primarySize = "";
        currentDataPayload.primaryFeedback = "";
        currentDataPayload.measureValue1 = 0;
        currentDataPayload.measureValue2 = 0;
        currentDataPayload.secondarySize = "未触发修正";
        currentDataPayload.secondaryFeedback = "完美合身/无需修正";

        document.getElementById('measure-input-1').value = "";
        document.getElementById('measure-input-2').value = "";
        document.getElementById('lowAgeTip').style.display = "none";

        document.querySelectorAll('.btn-feedback').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('measure-section').style.display = "none";
        document.getElementById('second-feedback-area').style.display = "none";
        document.getElementById('secondary-feedback-area').style.display = "none";
        document.getElementById('rec-card-bg').classList.remove('revised');

        document.getElementById('rec-title-type').innerText = "建议首选试穿码";
        document.getElementById('confidence-tag').innerText = "推荐置信度: 高";
    }

    // 根据身高获取基础尺码（年龄不参与尺码计算）
    function getBaseSize(height) {
        let baseIndex = height < 131 ? 0 : height < 141 ? 1 : height < 151 ? 2 : height < 161 ? 3 : 4;
        return SIZE_BRACKETS[baseIndex];
    }

    // 围度精细修正尺码
    function getPreciseSize(gender, height, category, measure1, measure2) {
        const baseSize = getBaseSize(height);
        const baseIndex = SIZE_BRACKETS.indexOf(baseSize);
        const standard = gender === 'boy' ? BOY_STANDARDS[baseSize] : GIRL_STANDARDS[baseSize];
        let adjustIndex = 0;
        if (category === "tshirt" || category === "jacket") {
            const chestDiff = measure1 - standard.chest;
            if (chestDiff > 6) adjustIndex = 1;
            if (chestDiff < -4) adjustIndex = -1;
        } else {
            const hipDiff = measure1 - standard.hip;
            const legDiff = measure2 - standard.leg;
            if (hipDiff > 6 || legDiff > 1.5) adjustIndex = 1;
            if (hipDiff < -4 || legDiff < -1) adjustIndex = -1;
        }
        let finalIdx = baseIndex + adjustIndex;
        if (finalIdx < 0) finalIdx = 0;
        if (finalIdx >= SIZE_BRACKETS.length) finalIdx = SIZE_BRACKETS.length - 1;
        return SIZE_BRACKETS[finalIdx];
    }

    function matchPrimarySize() {
        clearTimeout(calcTimer);
        calcTimer = setTimeout(() => {
            const age = parseFloat(document.getElementById('age').value);
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;

            if (isNaN(age) || age < 3 || age > 16) {
                alert("⚠️ 年龄范围3~16岁，请填写有效年龄");
                return;
            }
            if (isNaN(height) || height < 123 || height > 172) {
                alert("⚠️ 身高范围123~172cm，不在区间请前往小童/成人区");
                return;
            }
            if (isNaN(weight)) {
                alert("⚠️ 请填写净体重");
                return;
            }
            if (weight < 10 || weight > 150) {
                alert("⚠️ 体重范围10~150kg，请填写正确数值");
                return;
            }

            resetDownstreamState();
            const calculatedSize = getBaseSize(height);
            currentDataPayload.primarySize = calculatedSize;
            document.getElementById('rec-code').innerText = calculatedSize;
            document.getElementById('data-summary').innerText = `${age}岁 | ${height}cm | ${weight}kg | ${gender === 'boy' ? '男童' : '女童'}`;
            document.getElementById('consumer-view').style.display = "block";
            if (age < 7) {
                document.getElementById('lowAgeTip').style.display = "block";
            }
        }, 300);
    }

    function handlePrimaryFeedback(btnElement, status) {
        document.querySelectorAll('#primary-feedback-area .btn-feedback').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
        currentDataPayload.primaryFeedback = status;
        if (status === '完美合身') {
            document.getElementById('measure-section').style.display = "none";
            document.getElementById('second-feedback-area').style.display = "none";
            document.getElementById('secondary-feedback-area').style.display = "block";
        } else {
            const category = document.querySelector('input[name="category"]:checked').value;
            document.getElementById('measure-label-1').innerText = category === 'pants' ? "实测臀围" : "实测胸围";
            document.getElementById('measure-label-2').innerText = category === 'pants' ? "实测腿长" : "实测腰围";
            document.getElementById('measure-section').style.display = "block";
            document.getElementById('second-feedback-area').style.display = "none";
            document.getElementById('secondary-feedback-area').style.display = "none";
            document.getElementById('measure-section').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function matchSecondarySize() {
        const m1 = parseFloat(document.getElementById('measure-input-1').value);
        const m2 = parseFloat(document.getElementById('measure-input-2').value);
        const height = parseFloat(document.getElementById('height').value);
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const category = document.querySelector('input[name="category"]:checked').value;
        if (isNaN(m1) || m1 < 30 || m1 > 150 || isNaN(m2) || m2 < 30 || m2 > 150) {
            alert("请填写30~150cm有效围度");
            return;
        }
        currentDataPayload.measureValue1 = m1;
        currentDataPayload.measureValue2 = m2;
        currentDataPayload.secondarySize = "已执行精细修正";
        const newFixSize = getPreciseSize(gender, height, category, m1, m2);
        document.getElementById('rec-code').innerText = newFixSize;
        const recCard = document.getElementById('rec-card-bg');
        recCard.classList.add('revised');
        document.getElementById('rec-title-type').innerText = "精细修正后推荐尺码";
        document.getElementById('confidence-tag').innerText = "精细修正版";
        document.getElementById('second-feedback-area').style.display = "block";
        document.getElementById('secondary-feedback-area').style.display = "none";
        document.getElementById('second-feedback-area').scrollIntoView({ behavior: 'smooth' });
    }

    function handleSecondFeedback(btnElement, status) {
        document.querySelectorAll('#second-feedback-area .btn-feedback').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
        currentDataPayload.secondaryFeedback = status;
        document.getElementById('secondary-feedback-area').style.display = "block";
        document.getElementById('secondary-feedback-area').scrollIntoView({ behavior: 'smooth' });
    }

    function secureSubmitToCloud() {
        if (isSubmitting) return;
        const name = document.getElementById('tester-name').value.trim();
        const contact = document.getElementById('tester-contact').value.trim();
        isSubmitting = true;
        const finalData = {
            ...currentDataPayload,
            testerName: name,
            testerContact: contact,
            clientTimestamp: new Date().getTime()
        };
        const appId = "51e33a4a49bc32401b098ad45ef9827b";
        const apiKey = "6caadbe3f3f5ca1eed3d6a9324842383";
        fetch("https://api.bmobcloud.com/1/classes/ChildrenSizeFeedback", {
            method: "POST",
            headers: {
                "X-Bmob-Application-Id": appId,
                "X-Bmob-REST-API-Key": apiKey,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(finalData)
        })
        .then(res => {
            if (!res.ok) throw new Error("接口异常");
            document.getElementById('gift-modal').style.display = "flex";
        })
        .catch(err => {
            alert("数据上传失败，请检查网络后重试");
            console.error(err);
        })
        .finally(() => {
            isSubmitting = false;
        });
    }
</script>
</body>
</html>
