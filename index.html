<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童尺码助手</title>
    <style>
        :root {
            --decathlon-blue: #3643BA;
            --decathlon-green: #7AFFA6;
            --light-bg: #F4F6F9;
            --container-bg: #FFFFFF;
            --text-main: #111424;
            --text-muted: #676E8A;
            --warning-orange: #FF9800;
            --error-red: #D32F2F;
            --success-green: #2E7D32;
            --purple-deep: #6366F1;
            --border-base: #E2E8F0;
            --transition-base: all 0.2s ease;
            --input-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
            min-width: 320px;
        }

        .card-wrap {
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 20px;
        }
        .btn-base {
            width: 100%;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-base);
            margin-top: 8px;
        }
        .btn-base:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .input-base {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border-base);
            border-radius: var(--input-radius);
            font-size: 13.5px;
            outline: none;
            transition: var(--transition-base);
        }
        .input-base:focus {
            border-color: var(--decathlon-blue);
        }
        textarea.input-base {
            border-radius: var(--input-radius);
        }
        .tag-btn {
            padding: 4px 8px;
            border: 1px solid #c7d2fe;
            background: #f0f4ff;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin: 0 4px 4px 0;
        }
        .tag-btn:hover {
            background: #d8e4fc;
        }
        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            background-color: var(--decathlon-blue);
            color: #fff;
            display: inline-block;
            padding: 6px 16px;
            font-weight: 900;
            font-style: italic;
            font-size: 18px;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 8px;
            user-select: none;
        }
        h1 {
            font-size: 18px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .info-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--decathlon-blue);
            margin: 15px 0 10px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-base);
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        @media(min-width:400px) {
            .form-grid-2 {
                grid-template-columns: 1fr 1fr;
            }
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .radio-tile-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .radio-tile-label {
            position: relative;
            flex: 1;
            min-width: 80px;
        }
        .radio-tile-label input {
            position: absolute;
            opacity: 0;
            height: 0;
            width: 0;
        }
        .radio-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            border: 2px solid var(--border-base);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            transition: var(--transition-base);
        }
        .radio-tile-label input:checked + .radio-tile {
            border-color: var(--decathlon-blue);
            background-color: #F0F4FF;
            color: var(--decathlon-blue);
            font-weight: 600;
        }
        .radio-tile-label input:disabled + .radio-tile {
            background: #eee;
            color: #aaa;
            border-color: #ddd;
            cursor: not-allowed;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-input-with-unit {
            padding-right: 40px;
        }
        .input-unit {
            position: absolute;
            right: 14px;
            font-size: 12px;
            color: var(--text-muted);
            pointer-events: none;
        }
        .btn-calc {
            background-color: var(--decathlon-blue);
        }
        .btn-warning {
            background: var(--warning-orange);
        }
        .btn-purple {
            background: var(--purple-deep);
        }
        .result-view {
            display: none;
            margin-top: 20px;
            border-top: 2px dashed var(--border-base);
            padding-top: 15px;
        }
        .rec-card {
            background: linear-gradient(135deg, #3643BA 0%, #1A2580);
            color: white;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: var(--transition-base);
        }
        .rec-card.revised {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            box-shadow: 0 0 0 3px rgba(122, 255, 166, 0.4);
        }
        .confidence-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 20px;
            background-color: rgba(122, 255, 166, 0.2);
            color: #7AFFA6;
        }
        .rec-code {
            font-size: 22px;
            font-weight: 800;
            margin: 8px 0;
            letter-spacing: 0.5px;
        }
        .rec-style-hint {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 4px;
            padding: 4px;
            min-height: 20px;
        }
        .data-summary {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin: 10px 0;
        }
        .tip-lowage, .tip-compatible {
            background: rgba(255, 152, 0, 0.15);
            border: 1px solid var(--warning-orange);
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            color: #c25000;
            margin-top: 8px;
        }
        .reason-text {
            background: #e8f5e9;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            margin-top:10px;
            color:#1b5e20;
        }
        .feedback-box {
            background: #F8FAFC;
            border: 1px dashed #CBD5E1;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
        }
        .btn-feedback {
            flex: 1;
            background: white;
            border: 1px solid #CBD5E1;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-base);
        }
        .btn-feedback.selected {
            background: var(--decathlon-blue);
            border-color: var(--decathlon-blue);
            color: white;
        }
        .measure-section {
            display: none;
            background: #FFFBF0;
            border: 1px solid #FFE0B2;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
        }
        .jacket-ext-set {
            display:none;
            margin-top:10px;
            border-top:1px dashed #ffd299;
            padding-top:10px;
        }
        .second-feedback-box {
            background: #F0F4FF;
            border: 1px dashed #c7d2fe;
            display: none;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 14, 36, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        .modal-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0.3);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--decathlon-blue);
            margin-bottom: 8px;
        }
        .modal-highlight {
            font-size: 16px;
            color: #E65100;
            font-weight: bold;
            margin: 24px 0;
            padding: 15px;
            background: #FFF9E6;
            border: 1px dashed #FFE0B2;
            border-radius: 10px;
            line-height: 1.4;
        }
        .verify-code-text {
            font-size: 28px;
            letter-spacing:4px;
            color:#D32F2F;
            font-weight:900;
            margin:12px 0;
        }
        .modal-close {
            margin-top: 10px;
            background: #ccc;
        }
    </style>
</head>
<body>
<div class="container card-wrap">
    <header>
        <div class="logo">DECATHLON</div>
        <h1>儿童尺码助手</h1>
        <div class="subtitle">帮孩子找到更合身的尺寸</div>
    </header>

    <main>
        <div class="info-section-title">🏃 核心体征指标</div>
        <div class="form-group">
            <label class="form-label">使用场景</label>
            <div class="radio-tile-group" id="sceneCheckGroup">
                <label class="radio-tile-label">
                    <input type="checkbox" name="scene" value="hiking">
                    <div class="radio-tile">徒步</div>
                </label>
                <label class="radio-tile-label">
                    <input type="checkbox" name="scene" value="fitness">
                    <div class="radio-tile">体能训练</div>
                </label>
                <label class="radio-tile-label">
                    <input type="checkbox" name="scene" value="run">
                    <div class="radio-tile">跑步</div>
                </label>
                <label class="radio-tile-label">
                    <input type="checkbox" name="scene" value="water">
                    <div class="radio-tile">水上运动</div>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">目标服装品类</label>
            <div class="radio-tile-group">
                <label class="radio-tile-label">
                    <input type="radio" name="category" value="tshirt" checked onchange="changeToggleJacket()">
                    <div class="radio-tile">👕 T恤</div>
                </label>
                <label class="radio-tile-label">
                    <input type="radio" name="category" value="jacket" onchange="changeToggleJacket()">
                    <div class="radio-tile">🧥防晒/软壳外套</div>
                </label>
                <label class="radio-tile-label">
                    <input type="radio" name="category" value="pants" onchange="changeToggleJacket()">
                    <div class="radio-tile">👖 长裤</div>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">性别</label>
            <div class="radio-tile-group">
                <label class="radio-tile-label">
                    <input type="radio" name="gender" value="boy" checked>
                    <div class="radio-tile">👦 男童</div>
                </label>
                <label class="radio-tile-label">
                    <input type="radio" name="gender" value="girl">
                    <div class="radio-tile">👧 女童</div>
                </label>
            </div>
        </div>

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">名义年龄</label>
                <div class="input-wrapper">
                    <input type="number" id="age" class="input-base form-input-with-unit" placeholder="最低5岁" min="5" max="16">
                    <span class="input-unit">岁</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">实测裸脚身高(cm)</label>
                <div class="input-wrapper">
                    <input type="number" id="height" class="input-base form-input-with-unit" placeholder="119~172" min="100" max="172">
                    <span class="input-unit">cm</span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">实测净体重</label>
            <div class="input-wrapper">
                <input type="number" id="weight" class="input-base form-input-with-unit" placeholder="kg，支持一位小数" step="0.1" min="10" max="150">
                <span class="input-unit">kg</span>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">备注补充 (选填)</label>
            <input type="text" id="remark" class="input-base form-input-with-unit" placeholder="例如：想多穿一季、版型偏好宽松">
        </div>

        <div class="form-grid-2" style="gap:8px;">
            <button type="button" id="btn-primary-calc" class="btn-base btn-calc" onclick="matchPrimarySize()">实时计算试穿尺码</button>
            <button type="button" id="btn-reset-all" class="btn-base modal-close" onclick="fullResetAll()">清空全部表单</button>
        </div>

        <div class="result-view" id="consumer-view">
            <div class="rec-card" id="rec-card-bg">
                <span class="confidence-badge" id="confidence-tag">推荐置信度: 高</span>
                <div style="font-size:11px; opacity:0.8;" id="rec-title-type">建议首选试穿码</div>
                <div class="rec-code" id="rec-code">--</div>
                <div class="rec-style-hint" id="rec-style-hint">--</div>
            </div>
            <div class="data-summary" id="data-summary"></div>
            <div class="reason-text" id="reasonText" style="display:none;"></div>
            <div class="tip-lowage" id="lowAgeTip" style="display:none;">
                ⚠️ 提示：该儿童实际年龄低于样本基准7岁，版型偏大，试穿建议优先看宽松款
            </div>
            <div class="tip-compatible" id="compatibleTip" style="display:none;">
                ⚠️ 兼容提示：身高不足123cm，衣长裤长偏长，适合想多穿一季的孩子
            </div>

            <div class="feedback-box" id="primary-feedback-area">
                <div style="font-size:12px; font-weight:700; margin-bottom:8px;">🎯 阶段一：初次试穿确认</div>
                <div class="radio-tile-group">
                    <button class="btn-feedback" id="btn-fb-perfect" onclick="handlePrimaryFeedback(this, '完美合身')">👍 完美合身</button>
                    <button class="btn-feedback" id="btn-fb-modify" onclick="handlePrimaryFeedback(this, '不合身-需要精确修正')">👔 不太合适/需修正</button>
                </div>
            </div>

            <div class="measure-section" id="measure-section">
                <div style="font-size:12px; font-weight:700; color:#E65100; margin-bottom:8px;">📐 精细围度修正</div>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label" id="measure-label-1">实测胸围</label>
                        <div class="input-wrapper">
                            <input type="number" id="measure-input-1" class="input-base form-input-with-unit" placeholder="cm" min="30" max="150">
                            <span class="input-unit">cm</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="measure-label-2">实测腰围</label>
                        <div class="input-wrapper">
                            <input type="number" id="measure-input-2" class="input-base form-input-with-unit" placeholder="cm" min="30" max="150">
                            <span class="input-unit">cm</span>
                        </div>
                    </div>
                </div>
                <div class="jacket-ext-set" id="jacketExt">
                    <div class="form-group">
                        <label class="form-label">孩子体型</label>
                        <div class="radio-tile-group">
                            <label class="radio-tile-label">
                                <input type="radio" name="bodyShape" value="normal" checked>
                                <div class="radio-tile">标准体型</div>
                            </label>
                            <label class="radio-tile-label">
                                <input type="radio" name="bodyShape" value="fat">
                                <div class="radio-tile">偏壮/体重偏高</div>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">穿着需求</label>
                        <div class="radio-tile-group">
                            <label class="radio-tile-label">
                                <input type="radio" name="wearPrefer" value="fit" checked>
                                <div class="radio-tile">合身运动型</div>
                            </label>
                            <label class="radio-tile-label">
                                <input type="radio" name="wearPrefer" value="loose">
                                <div class="radio-tile">舒适宽松型</div>
                            </label>
                            <label class="radio-tile-label">
                                <input type="radio" name="wearPrefer" value="grow">
                                <div class="radio-tile">成长空间型</div>
                            </label>
                        </div>
                    </div>
                </div>
                <button type="button" id="btn-secondary-calc" class="btn-base btn-warning" onclick="matchSecondarySize()">运行 P95 三维修正算法</button>
            </div>

            <div class="feedback-box" id="second-feedback-area">
                <div style="font-size:12px; font-weight:700; color:#6366F1; margin-bottom:8px;">✨ 阶段二：精细修正后试穿反馈</div>
                <div class="radio-tile-group">
                    <button class="btn-feedback" id="btn-second-fit" onclick="handleSecondFeedback(this, '修正后合身')">✅ 修正后合身</button>
                    <button class="btn-feedback" id="btn-second-unfit" onclick="handleSecondFeedback(this, '依旧不合身')">❌ 依旧不合身</button>
                </div>
            </div>

            <div class="feedback-box" id="secondary-feedback-area" style="display:none;">
                <div style="font-size:12px; font-weight:700; color:#6366F1; margin-bottom:8px;">🚀 用户评价与反馈</div>
                <div class="form-group">
                    <label class="form-label">本尺码推荐是否有帮助？</label>
                    <div class="radio-tile-group">
                        <label class="radio-tile-label">
                            <input type="radio" name="useful" value="yes" checked>
                            <div class="radio-tile">有帮助</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="useful" value="no">
                            <div class="radio-tile">没有帮助</div>
                        </label>
                    </div>
                </div>
                <div class="form-group" id="tagWrap">
                    <label class="form-label">版型感受（点击快速填写）</label>
                    <div id="tagBox"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">补充说明</label>
                    <textarea id="parentFeedback" class="input-base" rows="2" placeholder="若方便可留下联系方式，我们将抽取用户免费试穿新款样品"></textarea>
                </div>
                <button type="button" id="btn-cloud-submit" class="btn-base btn-purple" onclick="secureSubmitToCloud()">确认无误并上传云端数据</button>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="gift-modal">
    <div class="modal-container">
        <div class="modal-title">🎉 感谢您的真实反馈</div>
        <div style="font-size: 13px; color: var(--text-muted);">数据已存档</div>
        <div class="modal-highlight">
            领奖核销码
            <div class="verify-code-text" id="showVerifyCode">XXXXXX</div>
            凭此页面到前台领取礼品<br>
            <small>当日有效，一码仅可兑换一次，截图转发无效</small>
        </div>
        <button class="btn-base btn-calc" onclick="location.reload()">重置系统</button>
        <button class="btn-base modal-close" onclick="closeModal()">关闭弹窗</button>
    </div>
</div>

<script>
    const SIZE_BRACKETS = ["123-130cm 7-8岁", "131-140cm 8-9岁", "141-150cm 10-11岁", "151-160cm 12-13岁", "161-172cm 14-15岁"];
    const BOY_STANDARDS = {
        "123-130cm 7-8岁": { chest: 63.74, waist: 57.99, hip: 67.55, leg: 20.39, avgWeight: 26.67 },
        "131-140cm 8-9岁": { chest: 69.00, waist: 63.06, hip: 73.01, leg: 21.32, avgWeight: 32.87 },
        "141-150cm 10-11岁": { chest: 75.53, waist: 69.01, hip: 79.69, leg: 23.07, avgWeight: 42.23 },
        "151-160cm 12-13岁": { chest: 82.72, waist: 74.28, hip: 86.34, leg: 25.73, avgWeight: 52.59 },
        "161-172cm 14-15岁": { chest: 87.81, waist: 77.22, hip: 92.27, leg: 27.74, avgWeight: 62.53 }
    };
    const GIRL_STANDARDS = {
        "123-130cm 7-8岁": { chest: 63.45, waist: 57.47, hip: 67.17, leg: 18.57, avgWeight: 26.07 },
        "131-140cm 8-9岁": { chest: 68.46, waist: 61.67, hip: 72.10, leg: 19.57, avgWeight: 31.54 },
        "141-150cm 10-11岁": { chest: 78.07, waist: 68.18, hip: 83.83, leg: 22.18, avgWeight: 43.31 },
        "151-160cm 12-13岁": { chest: 82.99, waist: 71.86, hip: 89.65, leg: 23.66, avgWeight: 50.64 },
        "161-172cm 14-15岁": { chest: 85.94, waist: 74.65, hip: 93.75, leg: 24.77, avgWeight: 56.62 }
    };
    const COMPAT_WEIGHT = { girl: 21.7, boy: 22.7 };
    const TAG_MAP = {
        tshirt: ["袖太长","袖太短","衣太长","衣太短","合身"],
        jacket: ["袖太长","袖太短","衣太长","衣太短","合身"],
        pants: ["腰太大","腰太紧","裤太长","裤太短","合身"]
    };

    let isSubmitting = false;
    let calcTimer = null;
    let currentVerifyCode = "";
    let currentDataPayload = {
        age: null,
        height: null,
        weight: null,
        gender: "",
        category: "",
        remark: "",
        primarySize: "",
        primaryFeedback: "",
        measureValue1: 0,
        measureValue2: 0,
        secondarySize: "未触发修正",
        secondaryFeedback: "未进行二次反馈",
        isCompatible: false,
        bodyShape: "normal",
        wearPrefer: "fit",
        useScene: "",
        useful: "yes",
        parentTextFeedback: "",
        verifyCode: "",
        createDay: new Date().toLocaleDateString()
    };

    function create6VerifyCode() {
        const str = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let code = "";
        for(let i=0; i<6; i++){
            const randomIdx = Math.floor(Math.random() * str.length);
            code += str[randomIdx];
        }
        return code;
    }

    const MAX_SCENE_SELECT = 3;
    const sceneCheckboxes = document.querySelectorAll('input[name="scene"]');
    function refreshSceneDisabled() {
        const checkedList = Array.from(sceneCheckboxes).filter(cb => cb.checked);
        sceneCheckboxes.forEach(cb => {
            if (checkedList.length >= MAX_SCENE_SELECT && !cb.checked) {
                cb.disabled = true;
            } else {
                cb.disabled = false;
            }
        });
    }
    sceneCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function () {
            const checkedList = Array.from(sceneCheckboxes).filter(cb => cb.checked);
            if (checkedList.length > MAX_SCENE_SELECT) {
                this.checked = false;
                alert(`使用场景最多只能选择${MAX_SCENE_SELECT}项，请先取消其他选项`);
            }
            refreshSceneDisabled();
        })
    });
    refreshSceneDisabled();

    function refreshTagBox() {
        const cat = document.querySelector('input[name="category"]:checked').value;
        const tags = TAG_MAP[cat];
        const box = document.getElementById('tagBox');
        box.innerHTML = "";
        tags.forEach(txt=>{
            const span = document.createElement("span");
            span.className = "tag-btn";
            span.innerText = txt;
            span.onclick = ()=>addTag(txt);
            box.appendChild(span);
        });
    }

    function changeToggleJacket() {
        const cat = document.querySelector('input[name="category"]:checked').value;
        const jacketBox = document.getElementById('jacketExt');
        if (cat === "jacket") jacketBox.style.display = "block";
        else jacketBox.style.display = "none";
        refreshTagBox();
    }

    function addTag(text) {
        const input = document.getElementById('parentFeedback');
        if(input.value) input.value += "，";
        input.value += text;
    }

    function closeModal() {
        document.getElementById('gift-modal').style.display = "none";
    }

    function fullResetAll() {
        document.querySelectorAll('.input-base,textarea').forEach(input => input.value = "");
        sceneCheckboxes.forEach(cb => cb.checked = false);
        refreshSceneDisabled();
        resetDownstreamState();
        document.getElementById('consumer-view').style.display = "none";
        currentVerifyCode = "";
    }

    function resetDownstreamState() {
        currentDataPayload.age = null;
        currentDataPayload.height = null;
        currentDataPayload.weight = null;
        currentDataPayload.gender = "";
        currentDataPayload.category = "";
        currentDataPayload.remark = "";
        currentDataPayload.primarySize = "";
        currentDataPayload.primaryFeedback = "";
        currentDataPayload.measureValue1 = 0;
        currentDataPayload.measureValue2 = 0;
        currentDataPayload.secondarySize = "未触发修正";
        currentDataPayload.secondaryFeedback = "未进行二次反馈";
        currentDataPayload.isCompatible = false;
        currentDataPayload.bodyShape = "normal";
        currentDataPayload.wearPrefer = "fit";
        const checkedScene = Array.from(sceneCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
        currentDataPayload.useScene = checkedScene.join(',') || "无";
        currentDataPayload.useful = "yes";
        currentDataPayload.parentTextFeedback = "";
        currentDataPayload.verifyCode = "";

        document.getElementById('measure-input-1').value = "";
        document.getElementById('measure-input-2').value = "";
        document.getElementById('parentFeedback').value = "";
        document.getElementById('lowAgeTip').style.display = "none";
        document.getElementById('compatibleTip').style.display = "none";
        document.getElementById('reasonText').style.display = "none";

        document.querySelectorAll('.btn-feedback').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('measure-section').style.display = "none";
        document.getElementById('jacketExt').style.display = "none";
        document.getElementById('second-feedback-area').style.display = "none";
        document.getElementById('secondary-feedback-area').style.display = "none";
        document.getElementById('rec-card-bg').classList.remove('revised');

        document.getElementById('rec-title-type').innerText = "建议首选试穿码";
        document.getElementById('confidence-tag').innerText = "推荐置信度: 高";
        refreshTagBox();
    }

    function getBaseSize(height) {
        let baseIndex = height < 131 ? 0 : height < 141 ? 1 : height < 151 ? 2 : height < 161 ? 3 : 4;
        return SIZE_BRACKETS[baseIndex];
    }

    function getPreciseSize(gender, height, category, measure1, measure2) {
        let baseSize;
        if (currentDataPayload.isCompatible) baseSize = SIZE_BRACKETS[0];
        else baseSize = getBaseSize(height);
        const baseIndex = SIZE_BRACKETS.indexOf(baseSize);
        const standard = gender === 'boy' ? BOY_STANDARDS[baseSize] : GIRL_STANDARDS[baseSize];
        let adjustIndex = 0;

        if (category === "tshirt") {
            const chestDiff = measure1 - standard.chest;
            if (chestDiff > 6) adjustIndex = 1;
            if (chestDiff < -4) adjustIndex = -1;
        } else if (category === "jacket") {
            const chestDiff = measure1 - standard.chest;
            const bodyShape = document.querySelector('input[name="bodyShape"]:checked').value;
            if (chestDiff >= 5) {
                adjustIndex = 1;
            } else if (chestDiff > 3 && chestDiff <5) {
                if (bodyShape === "fat") adjustIndex = 1;
            }
            const wear = document.querySelector('input[name="wearPrefer"]:checked').value;
            if (wear === "loose" && chestDiff >=3) adjustIndex +=1;
            if (wear === "grow") adjustIndex +=1;
        } else {
            const hipDiff = measure1 - standard.hip;
            const legDiff = measure2 - standard.leg;
            if (hipDiff > 6 || legDiff > 1.5) adjustIndex = 1;
            if (hipDiff < -4) adjustIndex = -1;
        }

        let finalIdx = baseIndex + adjustIndex;
        if (finalIdx < 0) finalIdx = 0;
        if (finalIdx >= SIZE_BRACKETS.length) finalIdx = SIZE_BRACKETS.length - 1;
        return { finalIdx, baseSize, standard };
    }

    function matchPrimarySize() {
        clearTimeout(calcTimer);
        calcTimer = setTimeout(() => {
            const age = parseFloat(document.getElementById('age').value);
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const category = document.querySelector('input[name="category"]:checked').value;
            const remark = document.getElementById('remark').value.trim();
            resetDownstreamState();

            currentDataPayload.age = age;
            currentDataPayload.height = height;
            currentDataPayload.weight = weight;
            currentDataPayload.gender = gender;
            currentDataPayload.category = category;
            currentDataPayload.remark = remark;

            if (isNaN(age) || age < 5 || age > 16) {
                alert("⚠️ 年龄范围5~16岁，请填写有效年龄");
                return;
            }
            if (isNaN(height) || height < 100 || height > 172) {
                alert("⚠️ 身高范围100~172cm");
                return;
            }
            if (isNaN(weight) || weight < 10 || weight > 150) {
                alert("⚠️ 体重范围10~150kg，请填写正确数值");
                return;
            }

            let targetSize = "";
            const compatMinH = 119;
            const compatMaxH = 122;
            const limitWeight = COMPAT_WEIGHT[gender];
            if (height < compatMinH) {
                alert(`身高${height}cm低于119cm门槛，请前往小童区域选购`);
                return;
            } else if (height >= compatMinH && height <= compatMaxH) {
                if (weight >= limitWeight) {
                    targetSize = SIZE_BRACKETS[0];
                    currentDataPayload.isCompatible = true;
                    document.getElementById('compatibleTip').style.display = "block";
                } else {
                    alert(`身高${height}cm，${gender==='boy'?'男':'女'}童体重需≥${limitWeight}，选购小童版型`);
                    return;
                }
            } else {
                targetSize = getBaseSize(height);
                currentDataPayload.isCompatible = false;
            }

            currentDataPayload.primarySize = targetSize;
            const checkedScene = Array.from(sceneCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            currentDataPayload.useScene = checkedScene.join(',') || "无";
            document.getElementById('rec-code').innerText = targetSize;
            document.getElementById('data-summary').innerText = `${age}岁 | ${height}cm | ${weight}kg | ${gender === 'boy' ? '男童' : '女童'}`;
            document.getElementById('consumer-view').style.display = "block";
            if (age < 7) document.getElementById('lowAgeTip').style.display = "block";
            changeToggleJacket();
        }, 300);
    }

    function handlePrimaryFeedback(btnElement, status) {
        document.querySelectorAll('#primary-feedback-area .btn-feedback').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
        currentDataPayload.primaryFeedback = status;
        if (status === '完美合身') {
            document.getElementById('measure-section').style.display = "none";
            document.getElementById('second-feedback-area').style.display = "none";
            document.getElementById('secondary-feedback-area').style.display = "block";
        } else {
            const category = document.querySelector('input[name="category"]:checked').value;
            document.getElementById('measure-label-1').innerText = category === 'pants' ? "实测臀围" : "实测胸围";
            document.getElementById('measure-label-2').innerText = category === 'pants' ? "实测腿长" : "实测腰围";
            document.getElementById('measure-section').style.display = "block";
            document.getElementById('second-feedback-area').style.display = "none";
            document.getElementById('secondary-feedback-area').style.display = "none";
            document.getElementById('measure-section').scrollIntoView({ behavior: 'smooth' });
            changeToggleJacket();
        }
    }

    function matchSecondarySize() {
        const m1 = parseFloat(document.getElementById('measure-input-1').value);
        const m2 = parseFloat(document.getElementById('measure-input-2').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const category = document.querySelector('input[name="category"]:checked').value;
        const bodyShape = document.querySelector('input[name="bodyShape"]:checked').value;
        const wearPrefer = document.querySelector('input[name="wearPrefer"]:checked').value;
        currentDataPayload.bodyShape = bodyShape;
        currentDataPayload.wearPrefer = wearPrefer;
        if (isNaN(m1) || m1 < 30 || m1 > 150 || isNaN(m2) || m2 < 30 || m2 > 150) {
            alert("请填写30~150cm有效围度");
            return;
        }
        currentDataPayload.measureValue1 = m1;
        currentDataPayload.measureValue2 = m2;
        currentDataPayload.secondarySize = "已执行精细修正";
        const res = getPreciseSize(gender, height, category, m1, m2);
        const newFixSize = SIZE_BRACKETS[res.finalIdx];
        const baseStd = res.standard;
        const chestDiff = m1 - baseStd.chest;

        let reason = "";
        if (category === "tshirt") {
            if (chestDiff >= 6) reason = "推荐原因：胸围偏宽，选择大一码贴身舒适";
            else if (chestDiff <= -4) reason = "推荐原因：胸围偏窄，选择小一码贴合身形";
            else reason = "推荐原因：当前胸围贴合标准，适合日常贴身穿着";
        } else if (category === "jacket") {
            if (wearPrefer === "grow") reason = "推荐原因：选择成长宽松款，预留1-2年穿着空间，轻薄外套活动更自在";
            else if (wearPrefer === "loose") reason = "推荐原因：偏好宽松版型，外套预留充足手臂活动余量";
            else if (chestDiff >=5) reason = "推荐原因：胸围偏宽，轻薄防晒衣需要活动空间，加大一码";
            else if (chestDiff>3 && bodyShape==="fat") reason = "推荐原因：孩子体型偏壮，外层外套预留宽松活动空间";
            else reason = "推荐原因：体型标准，合身剪裁适合日常户外活动";
        } else {
            reason = "推荐原因：臀围腿长匹配标准，裤装穿着合身";
        }
        document.getElementById('reasonText').innerText = "推荐：" + newFixSize + " \n" + reason;
        document.getElementById('reasonText').style.display = "block";

        document.getElementById('rec-code').innerText = newFixSize;
        const recCard = document.getElementById('rec-card-bg');
        recCard.classList.add('revised');
        document.getElementById('rec-title-type').innerText = "精细修正后推荐尺码";
        document.getElementById('confidence-tag').innerText = "精细修正版";
        document.getElementById('second-feedback-area').style.display = "block";
        document.getElementById('secondary-feedback-area').style.display = "none";
        document.getElementById('second-feedback-area').scrollIntoView({ behavior: 'smooth' });
    }

    function handleSecondFeedback(btnElement, status) {
        document.querySelectorAll('#second-feedback-area .btn-feedback').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
        currentDataPayload.secondaryFeedback = status;
        document.getElementById('secondary-feedback-area').style.display = "block";
        refreshTagBox();
        document.getElementById('secondary-feedback-area').scrollIntoView({ behavior: 'smooth' });
    }

    function secureSubmitToCloud() {
        if (isSubmitting) return;
        currentVerifyCode = create6VerifyCode();
        currentDataPayload.verifyCode = currentVerifyCode;
        currentDataPayload.createDay = new Date().toLocaleDateString();

        const parentText = document.getElementById('parentFeedback').value.trim();
        const useful = document.querySelector('input[name="useful"]:checked').value;
        const checkedScene = Array.from(sceneCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
        currentDataPayload.useScene = checkedScene.join(',') || "无";
        currentDataPayload.useful = useful;
        currentDataPayload.parentTextFeedback = parentText;
        
        isSubmitting = true;

        // 【核心字段重构】：缩减顶层属性，将琐碎体征全部聚合并存入 infoDetails 对象
        const finalData = {
            verifyCode: currentVerifyCode,
            createDay: currentDataPayload.createDay,
            clientTimestamp: new Date().getTime(),
            infoDetails: {
                age: currentDataPayload.age,
                height: currentDataPayload.height,
                weight: currentDataPayload.weight,
                gender: currentDataPayload.gender,
                category: currentDataPayload.category,
                remark: currentDataPayload.remark,
                primarySize: currentDataPayload.primarySize,
                primaryFeedback: currentDataPayload.primaryFeedback,
                measureValue1: currentDataPayload.measureValue1,
                measureValue2: currentDataPayload.measureValue2,
                secondarySize: currentDataPayload.secondarySize,
                secondaryFeedback: currentDataPayload.secondaryFeedback,
                isCompatible: currentDataPayload.isCompatible,
                bodyShape: currentDataPayload.bodyShape,
                wearPrefer: currentDataPayload.wearPrefer,
                useScene: currentDataPayload.useScene,
                useful: currentDataPayload.useful,
                parentTextFeedback: currentDataPayload.parentTextFeedback
            }
        };

        const appId = "51e33a4a49bc32401b098ad45ef9827b";
        const apiKey = "6caadbe3f3f5ca1eed3d6a9324842383";
        
        fetch("https://api.codenow.cn/1/classes/JRSFFeedback", {
            method: "POST",
            headers: {
                "X-Bmob-Application-Id": appId,
                "X-Bmob-REST-API-Key": apiKey,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(finalData)
        })
        .then(async res => {
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(`服务器拒绝接收 [状态码 ${res.status}]: ${JSON.stringify(errorData)}`);
            }
            document.getElementById("showVerifyCode").innerText = currentVerifyCode;
            document.getElementById('gift-modal').style.display = "flex";
        })
        .catch(err => {
            alert("上传未能完成，请参考以下提示：\n" + err.message);
            console.error(err);
        })
        .finally(() => {
            isSubmitting = false;
        });
    }
</script>
